[pytest]
# Registering markers documents the categories and lets you run subsets, e.g.
#   pytest -m error_handling    (only the error tests)
#   pytest -m "not slow"        (skip slow tests)
markers =
    smoke: minimal checks that the API is reachable and returning JSON
    error_handling: tests for how the API responds to invalid input
    validation: schema and data-type checks
    edge_case: boundary values and unusual-but-valid inputs

# Show a short summary of all non-passing test outcomes at the end of a run.
addopts = -ra --strict-markers
testpaths = tests
